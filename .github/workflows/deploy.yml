name: Test, build and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow one concurrent deployment; cancel in-progress runs on new push
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Tests ─────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  # ── 2. Build + upload Pages artifact ─────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── 3. Deploy to GitHub Pages (main branch only) ─────────────
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deploy
